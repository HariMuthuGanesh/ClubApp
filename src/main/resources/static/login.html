<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ClubApp — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="nec-logo-block">
                <div id="logo-area" class="nec-logo-block"
                    style="border:none;margin:0;padding:0;flex-direction:column;gap:0;justify-content:center;width:100%;text-align:center;margin-bottom:1rem;">
                    <div id="logo-img" class="nec-logo-block"
                        style="width:64px;height:64px;margin:0 auto .75rem;border-radius:12px;overflow:hidden;flex-shrink:0;background:var(--nec-blue);display:flex;align-items:center;justify-content:center;border:none;padding:0;">
                        <div style="color:var(--nec-gold);font-weight:700;font-size:1.2rem;">NEC</div>
                    </div>
                    <div style="color:var(--nec-blue);font-weight:600;font-size:1rem;">National Engineering College
                    </div>
                    <div style="color:var(--text-muted);font-size:.75rem;margin-top:3px;">Kovilpatti</div>
                </div>
            </div>
            <h2 class="auth-title">Club Management System</h2>
            <div class="auth-tabs"><button id="tab-login" class="tab-btn active"
                    onclick="switchTab('login')">Login</button><button id="tab-register" class="tab-btn"
                    onclick="switchTab('register')">Register</button></div>
            <div id="auth-message" class="auth-message hidden"></div>
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group"><label>Email</label><input type="email" id="login-email"
                        placeholder="you@nec.edu.in" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="login-password"
                        placeholder="••••••••" required></div><button type="submit" class="btn btn-primary btn-full"
                    id="login-btn">Sign In</button>
            </form>
            <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
                <div class="form-group"><label>Full Name</label><input type="text" id="reg-name"
                        placeholder="Your full name" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="reg-email"
                        placeholder="you@nec.edu.in" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="reg-password"
                        placeholder="Min 8 characters" required minlength="8"></div>
                <div class="form-group"><label>Department</label><select id="reg-dept" required>
                        <option value="">Select department</option>
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="EEE">EEE</option>
                        <option value="MECH">Mechanical</option>
                        <option value="CIVIL">Civil</option>
                        <option value="IT">IT</option>
                        <option value="ITU">ITU</option>
                        <option value="AIDS">AI & DS</option>
                        <option value="CSBS">CSBS</option>
                    </select></div>
                <div class="form-group"><label>Year</label><select id="reg-year" required>
                        <option value="">Select year</option>
                        <option value="I">I Year</option>
                        <option value="II">II Year</option>
                        <option value="III">III Year</option>
                        <option value="IV">IV Year</option>
                    </select></div><button type="submit" class="btn btn-primary btn-full" id="register-btn">Create
                    Account</button>
                <p class="auth-note">Only students can self-register. Staff coordinators are created by admin.</p>
            </form>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script>function switchTab(tab) { document.getElementById('login-form').classList.toggle('hidden', tab !== 'login'); document.getElementById('register-form').classList.toggle('hidden', tab !== 'register'); document.getElementById('tab-login').classList.toggle('active', tab === 'login'); document.getElementById('tab-register').classList.toggle('active', tab === 'register'); clearMessage() } function showMessage(msg, type = 'error') { if (!msg) return; const el = document.getElementById('auth-message'); el.textContent = msg; el.className = `auth-message ${type}`; el.classList.remove('hidden') } function clearMessage() { document.getElementById('auth-message').classList.add('hidden') } async function handleLogin(e) { e.preventDefault(); const btn = document.getElementById('login-btn'); btn.textContent = 'Signing in...'; btn.disabled = true; try { const data = await api.post('/auth/login', { email: document.getElementById('login-email').value, password: document.getElementById('login-password').value }); localStorage.setItem('token', data.token); localStorage.setItem('name', data.name); localStorage.setItem('email', data.email); localStorage.setItem('role', data.role); localStorage.setItem('user', JSON.stringify(data)); window.location.href = data.role === 'ADMIN' ? '/admin.html' : '/dashboard.html' } catch (err) { let msg = 'Invalid credentials.'; if (err.error) msg = err.error; else if (err.message) msg = err.message; showMessage(msg); btn.textContent = 'Sign In'; btn.disabled = false } } async function handleRegister(e) { e.preventDefault(); const btn = document.getElementById('register-btn'); btn.textContent = 'Creating account...'; btn.disabled = true; try { const data = await api.post('/auth/register', { name: document.getElementById('reg-name').value, email: document.getElementById('reg-email').value, password: document.getElementById('reg-password').value, department: document.getElementById('reg-dept').value, year: document.getElementById('reg-year').value }); localStorage.setItem('token', data.token); localStorage.setItem('name', data.name); localStorage.setItem('email', data.email); localStorage.setItem('role', data.role); localStorage.setItem('user', JSON.stringify(data)); window.location.href = '/dashboard.html' } catch (err) { let msg = 'Registration failed.'; if (err.error) msg = err.error; else if (err.message) msg = err.message; if (err.errors && Array.isArray(err.errors)) { msg = err.errors.map(e => e.defaultMessage || e).join(' • ') } else if (typeof err === 'object' && !err.error && !err.message) { const vals = Object.values(err).filter(v => typeof v === 'string'); if (vals.length) msg = vals.join(' • ') } showMessage(msg); btn.textContent = 'Create Account'; btn.disabled = false } } async function initAuth() { try { const college = await api.get('/college'); if (college.logoImage) { document.getElementById('logo-img').innerHTML = `<img src="/uploads/${college.logoImage}" style="width:100%;height:100%;object-fit:contain;" />` } if (college.collegeName) { document.querySelector('.auth-card').style.borderTopColor = college.logoImage ? 'var(--nec-gold)' : 'var(--nec-gold)' } } catch (e) { console.error(e) } } initAuth();</script>
</body>

</html>
